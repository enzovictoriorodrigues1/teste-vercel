<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=1280, initial-scale=1">
    <style>
        @font-face {
            font-family: 'sourcesanspro';
            font-style: normal;
            font-weight: 400;
            font-display: block;
            src: url(https://design.penpot.app/fonts/sourcesanspro-regular.woff) format('woff');
        }

        /* Força o HTML e o Body a terem no mínimo a largura do seu design */
        html, body {
            margin: 0;
            padding: 0;
            width: 1280px; 
            min-width: 1280px;
            min-height: 100vh;
            background-color: #f0f0f0;
            /* Garante que o scroll lateral apareça se a tela for menor que 1280px */
            overflow-x: auto; 
        }

        .desktop-d9bf5e2f4b53 {
            position: relative;
            width: 1280px;
            height: 800px;
            background: #FFFFFF;
        }

        /* Imagem Gigante Centralizada */
        .image-dd88fa443c74 {
            position: absolute;
            left: 50%;
            transform: translateX(-50%); 
            top: 85px;
            
            width: 1000px; /* Aumentei para garantir que passe da tela do mobile */
            height: 800px;
            
            background-color: #ccc;
            background-image: url('./oshawott.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .group-ddbb11f78293 {
            position: absolute;
            left: 62px;
            top: 218px;
            width: 216px;
            height: 64px;
            z-index: 10;
            cursor: pointer;
        }

        .rectangle-ddbacd4b3fba {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #232326;
        }

        .ir-para-a-ddbadc131169 {
            position: absolute;
            left: 16px;
            top: 19px;
            color: #34b45a;
            font-family: "sourcesanspro";
            font-size: 22px;
            white-space: nowrap; /* Impede o texto de quebrar linha */
        }
    </style>
</head>
<body>
    <div class="desktop-d9bf5e2f4b53">
        <div class="image-dd88fa443c74"></div>
        
        <div class="group-ddbb11f78293" id="botaoMobile">
            <div class="rectangle-ddbacd4b3fba"></div>
            <div class="ir-para-a-ddbadc131169">Ir para a tela mobile</div>
        </div>
    </div>

    <script>
        document.getElementById('botaoMobile').onclick = function() {
            window.location.href = 'tela-mobile.html';
        };
    </script>
</body>
</html>
