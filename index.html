<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=1280">
    <style>
        @font-face {
            font-family: 'sourcesanspro';
            font-style: normal;
            font-weight: 400;
            font-display: block;
            src: url(https://design.penpot.app/fonts/sourcesanspro-regular.woff) format('woff');
        }

        html, body {
            margin: 0;
            padding: 0;
            /* 2. Importante: Remova o 100vw para permitir que o conteúdo transborde livremente */
            min-height: 100%;
        }

        body {
            /* 3. Garantir que o scroll lateral funcione */
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background-color: #f0f0f0; /* cor de fundo apenas para teste */
        }

        /* Container do Desktop */
        .desktop-d9bf5e2f4b53 {
            position: relative;
            width: 1280px;      /* Largura travada */
            min-width: 1280px;  /* Impede que o container encolha */
            height: 800px;
            background: #FFFFFF;
            margin: 0 auto;     /* Centraliza o "quadro" de 1280px se a tela for maior */
            overflow: visible;
        }

        /* Ajuste da Imagem Central */
        .image-dd88fa443c74 {
            position: absolute;
            /* 4. Vamos colocar a imagem bem no centro dos 1280px */
            left: 50%;
            transform: translateX(-50%); 
            top: 85px;
            
            /* 5. Aumente aqui se quiser que ela seja realmente gigante */
            width: 800px; 
            height: 656px;
            
            background-color: #ccc; /* cinza caso a imagem não carregue */
            background-image: url('oshawott.png') no-repeat center center / cover;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        } /* <--- FECHAMENTO DA CHAVE QUE FALTAVA */

        .group-ddbb11f78293 {
            position: absolute;
            left: 62px;
            top: 218px;
            width: 216px;
            height: 64px;
            z-index: 10;
        }

        .rectangle-ddbacd4b3fba {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #232326;
        }

        .ir-para-a-ddbadc131169 {
            position: absolute;
            left: 16px;
            top: 19px;
            color: #34b45a;
            font-family: "sourcesanspro";
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="frame desktop-d9bf5e2f4b53">
        <div class="shape rect image-dd88fa443c74"></div>
        
        <div class="frame group-ddbb11f78293" id="botaoMobile">
            <div class="shape rect rectangle-ddbacd4b3fba"></div>
            <div class="shape text ir-para-a-ddbadc131169">Ir para a tela mobile</div>
        </div>
    </div>

    <script>
        const botaoMobile = document.getElementById('botaoMobile');
        botaoMobile.style.cursor = 'pointer';
        botaoMobile.addEventListener("click", function() {
            window.location.href = 'tela-mobile.html';
        });
    </script>
</body>
</html>
