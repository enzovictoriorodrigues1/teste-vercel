<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @font-face {
            font-family: 'sourcesanspro';
            font-style: normal;
            font-weight: 400;
            font-display: block;
            src: url(https://design.penpot.app/fonts/sourcesanspro-regular.woff) format('woff');
        }

        /* O SEGREDO: Forçamos o documento a ser gigante, independente do aparelho */
        html, body {
            margin: 0;
            padding: 0;
            width: 1280px !important; 
            min-width: 1280px !important;
            height: 100%;
            background-color: #f0f0f0;
            /* Força o scroll horizontal e desativa o ajuste automático */
            overflow-x: auto !important;
            -webkit-text-size-adjust: none; 
        }

        .desktop-d9bf5e2f4b53 {
            position: relative;
            width: 1280px;
            height: 800px;
            background: #FFFFFF;
            /* Impede que o container tente se auto-ajustar */
            display: block; 
        }

        .image-dd88fa443c74 {
            position: absolute;
            left: 500px; /* Posicionada de forma fixa para garantir que "saia" da tela */
            top: 85px;
            width: 800px; 
            height: 656px;
            
            background-color: #ccc;
            background-image: url('./oshawott.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .group-ddbb11f78293 {
            position: absolute;
            left: 62px;
            top: 218px;
            width: 216px;
            height: 64px;
            z-index: 10;
            cursor: pointer;
        }

        .rectangle-ddbacd4b3fba {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #232326;
        }

        .ir-para-a-ddbadc131169 {
            position: absolute;
            left: 16px;
            top: 19px;
            color: #34b45a;
            font-family: "sourcesanspro";
            font-size: 22px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    
    <div class="desktop-d9bf5e2f4b53">
        <div class="image-dd88fa443c74"></div>
        
        <div class="group-ddbb11f78293" id="botaoMobile">
            <div class="rectangle-ddbacd4b3fba"></div>
            <div class="ir-para-a-ddbadc131169">Ir para a tela mobile</div>
        </div>
    </div>

    <script>
        document.getElementById('botaoMobile').onclick = function() {
            window.location.href = 'tela-mobile.html';
        };
    </script>
</body>
</html>
