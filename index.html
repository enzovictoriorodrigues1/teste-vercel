<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=1280">
    <style>
        @font-face {
            font-family: 'sourcesanspro';
            font-style: normal;
            font-weight: 400;
            font-display: block;
            src: url(https://design.penpot.app/fonts/sourcesanspro-regular.woff) format('woff');
        }

        html, body {
            margin: 0;
            padding: 0;
            /* 2. Forçamos o body a ter a largura do seu design */
            width: 1280px; 
            min-height: 100vh;
            /* 3. Permitimos o scroll lateral explicitamente */
            overflow-x: auto; 
            background-color: #f0f0f0;
        }

        .desktop-d9bf5e2f4b53 {
            position: relative;
            width: 1280px;      /* Largura travada */
            height: 800px;
            background: #FFFFFF;
            overflow: visible; /* Garante que nada seja cortado internamente */
        }

        .image-dd88fa443c74 {
            position: absolute;
            left: 50%;
            transform: translateX(-50%); 
            top: 85px;
            
            /* Imagem Gigante */
            width: 800px; 
            height: 656px;
            
            background-color: #ccc;
            background-image: url('./oshawott.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* O botão fica fixo na posição do design original */
        .group-ddbb11f78293 {
            position: absolute;
            left: 62px;
            top: 218px;
            width: 216px;
            height: 64px;
            z-index: 10;
            cursor: pointer;
        }

        .rectangle-ddbacd4b3fba {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #232326;
        }

        .ir-para-a-ddbadc131169 {
            position: absolute;
            left: 16px;
            top: 19px;
            color: #34b45a;
            font-family: "sourcesanspro";
            font-size: 22px;
        }
    </style>
</head>
<body>
    
    <div class="frame desktop-d9bf5e2f4b53">
        <div class="shape rect image-dd88fa443c74"></div>
        
        <div class="frame group-ddbb11f78293" id="botaoMobile">
            <div class="shape rect rectangle-ddbacd4b3fba"></div>
            <div class="shape text ir-para-a-ddbadc131169">Ir para a tela mobile</div>
        </div>
    </div>

    <script>
        document.getElementById('botaoMobile').addEventListener("click", function() {
            window.location.href = 'tela-mobile.html';
        });
    </script>
</body>
</html>
